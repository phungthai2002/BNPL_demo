
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNPL Credit Risk Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
        }

        .header {
            padding: 18px 28px;
            background: #0f4c81;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav {
            padding: 12px 28px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .nav a {
            color: #0f4c81;
            text-decoration: none;
            font-weight: bold;
            margin-right: 20px;
        }

        .dashboard-container {
            width: 100%;
            height: calc(100vh - 105px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>
        <div class="header">
        BNPL Credit Risk Decision Support System
    </div>

    <div class="nav">
        <a href="/">Power BI Dashboard</a>
        <a href="/prediction">Prediction App</a>
    </div>

<div class="container">

    <div class="card">

        <h1>BNPL Credit Risk Prediction</h1>
        <p class="subtitle">
            Predict whether a customer is likely to default on a Buy Now Pay Later (BNPL) transaction.
        </p>

        <form id="predictForm">

            <div class="grid">

                <div class="input-group">
                    <label>Age</label>
                    <input type="number" id="age" required>
                </div>

                <div class="input-group">
                    <label>Credit Score</label>
                    <input type="number" id="credit_score" required>
                </div>

                <div class="input-group">
                    <label>Monthly Income ($)</label>
                    <input type="number" id="monthly_income" step="0.01" required>
                </div>

                <div class="input-group">
                    <label>Purchase Amount ($)</label>
                    <input type="number" id="purchase_amount" step="0.01" required>
                </div>

                <!-- <div class="input-group">
                    <label>Debt-to-Income Ratio</label>
                    <input type="number" id="debt_to_income_ratio" step="0.01" required>
                </div> -->

                <div class="input-group">
                    <label>Employment Type</label>

                    <select id="employment_type">

                        <option>Salaried</option>

                        <option>Self-Employed</option>

                        <option>Student</option>

                        <option>Unemployed</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>BNPL Installments</label>

                    <select id="bnpl_installments">

                        <option>3</option>

                        <option>6</option>

                        <option>9</option>

                        <option>12</option>

                    </select>

                </div>

            </div>

            <button type="submit">
                Predict Credit Risk
            </button>

        </form>

    </div>

    <div class="card result-card">

        <h2>Prediction Result</h2>

        <div id="loading" style="display:none;">
            Predicting...
        </div>

        <div id="result" style="display:none;">

            <h3 id="predictionText"></h3>

            <div class="probability-box">

                Probability

                <span id="probability"></span>

            </div>

            <div class="risk-box">

                Risk Level

                <span id="riskLevel"></span>

            </div>

            <div class="action-box">

                <h3>Recommended Action:</h3>

                <span id="recommendedAction"></span>

            </div>

            <!-- <h3>Explanation</h3>

            <ul id="explanationList">
            </ul> -->

        </div>

    </div>

</div>


<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
